<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" type="text/css" th:href="@{/style.css}" />
  </head>
  <body>
    <h1>Staff Details</h1>

    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Title</th>
          <th>Salary</th>
        </tr>
      </thead>

      <tbody>
        <tr th:each="staff : ${allStaff}">
          <td th:text="${staff.name}"></td>
          <td th:text="${staff.title}"></td>
          <td th:text="${staff.salary}"></td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
