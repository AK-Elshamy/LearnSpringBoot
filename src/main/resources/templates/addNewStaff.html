<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" type="text/css" th:href="@{/style.css}" />
  </head>
  <body>
    <h1>Add New Staff</h1>

    <form
      method="post"
      th:object="${addNewStaff}"
      th:action="@{/addSubmitForm}"
    >
      <label for="staffName">Staff Name:</label>
      <input type="text" id="staffName" th:field="*{name}" />
      <br /><br />
      <label for="staffTitle">Staff Title:</label>
      <input type="text" id="staffTitle" th:field="*{title}" />
      <br /><br />
      <label for="staffSalary">Staff Salary:</label>
      <input type="text" id="staffSalary" th:field="*{salary}" />
      <br /><br />
      <button type="submit">Submit</button>
    </form>
  </body>
</html>
